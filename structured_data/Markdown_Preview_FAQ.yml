type: FAQPage
intro: Common questions about live Markdown preview with Marked 3 on macOS.
items:
  - question: What is the best app to preview Markdown on a Mac?
    answer: Marked 3 is a native macOS app built for live Markdown preview from any editor, with export and proofreading. See Live Markdown Preview on Mac in the Marked help documentation.
    body: |
      Marked 3 is a native macOS app built for live Markdown preview from any editor, with export and proofreading. See [Live Markdown Preview on Mac](Live_Markdown_Preview_on_Mac.html).

  - question: Can Marked preview Markdown from my existing editor?
    answer: Yes. Marked works with VS Code, Obsidian, Bear, Ulysses, Scrivener, MarsEdit, Word, and any app that saves plain text or Markdown. See Additional Application Support in the Marked help documentation.
    body: |
      Yes. Marked works with VS Code, Obsidian, Bear, Ulysses, Scrivener, MarsEdit, Word, and any app that saves plain text or Markdown. See [Additional Application Support](Additional_Application_Support.html).

  - question: Does Marked edit Markdown or only preview it?
    answer: Marked is primarily a preview and publishing tool, not a Markdown editor. You write in your preferred app and use Marked for live preview, proofreading, custom CSS themes, and export. Marked also includes a built-in Markdown Dingus for quick corrections and syntax testing; it is not intended to replace a full text editor.
    body: |
      Marked is primarily a preview and publishing tool, not a Markdown editor. You write in your preferred app and use Marked for live preview, proofreading, custom CSS themes, and export.

      Marked also includes a built-in [Markdown Dingus](Markdown_Dingus.html) with editing features for making quick corrections and testing Markdown syntax. It is not intended to replace a good text editor, but is really helpful when you spot a fix while proofreading or want to experiment with processor syntax without leaving Marked.

  - question: How is Marked different from Obsidian's built-in preview?
    answer: Obsidian's built-in preview is ideal when you only write inside Obsidian. Marked adds publish-quality export, advanced proofreading, custom CSS themes, and live preview from any editor — not just Obsidian. See Marked vs Obsidian Preview in the Marked help documentation for a full comparison.
    body: |
      See [Marked vs Obsidian Preview](Marked_vs_Obsidian_Preview.html).

  - question: When should I choose Marked 3, Typora, Obsidian, or Marked 2?
    answer: Typora and Obsidian are excellent all-in-one write-and-preview apps. Marked 3 is a dedicated preview app with advanced proofreading, document statistics, keyword highlighting, custom CSS themes, and professional export to PDF, DOCX, EPUB, and more. You can use Marked alongside Typora or Obsidian for publish-quality preview and export while keeping your preferred editor. Marked 2 is a simpler legacy app with a one-time purchase at marked2app.com.
    body: |
      * **Typora** and **Obsidian** are excellent if you want a simple, all-in-one solution---write and preview in a single app without extra setup.
      * **Marked 3** focuses on a dedicated preview with many features built-in previews often lack: advanced [proofreading](Spelling_Grammar.html), [document statistics](Document_Statistics.html), [keyword highlighting](Keyword_Highlighting.html), [custom CSS themes](Custom_Styles.html), and professional [export](Exporting.html) to PDF, DOCX, EPUB, and more.
      * You do not have to choose one or the other. Marked works **alongside** Typora, Obsidian, and other editors---open the same file or vault in Marked for publish-quality preview, proofreading, and export while you keep writing where you prefer. See [Marked vs Obsidian Preview](Marked_vs_Obsidian_Preview.html) for a combined Obsidian workflow.
      * **Marked 2:** Simpler legacy app, one-time purchase. See [https://marked2app.com](https://marked2app.com)

  - question: My preview doesn't update when I save. What should I check?
    answer: See Preview doesn't update when file is saved in the Marked help documentation. Also verify your processor choice in Choosing a Processor.
    body: |
      See [Preview doesn't update when file is saved](Preview_doesn_t_update_when_file_is_saved.html). Also verify processor choice in [Choosing a Processor](Choosing_a_Processor.html).

  - question: Which Markdown processor should I use?
    answer: See Choosing a Processor in the Marked help documentation. Marked supports CommonMark (GFM), Kramdown, MultiMarkdown, and custom processors.
    body: |
      See [Choosing a Processor](Choosing_a_Processor.html). Marked supports CommonMark (GFM), Kramdown, MultiMarkdown, and custom processors.

  - question: Can I preview a file without opening an editor?
    answer: Yes. Drag any Markdown file onto Marked to preview, print, or export. See Opening Files in the Marked help documentation.
    body: |
      Yes. Drag any Markdown file onto Marked to preview, print, or export. See [Opening Files](Opening_Files.html).

  - question: Does Marked work with iCloud or Dropbox paths?
    answer: Yes, for locally synced files Marked can access. Open the file or folder from its synced location on disk.
    body: |
      Yes, for locally synced files Marked can access. Open the file or folder from its synced location on disk.

  - question: What's the difference between file watching and Streaming Preview?
    answer: File watching updates the preview when you save. Streaming Preview pushes content from supported apps such as Bear, Drafts, and nvUltra as you type. See Streaming Preview in the Marked help documentation.
    body: |
      File watching updates when you save. Streaming Preview pushes content from supported apps (Bear, Drafts, nvUltra, etc.) as you type. See [Streaming Preview](Streaming_Preview.html).
